<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <label for="inputField">Input the temperature</label>
    <div>
        <input type="number" id="inputField" placeholder="0">
        <button id="resetBtn">Reset</button><br>
        <label for="resultCtoF" id="rCF" style="display: none;">C to F:</label>
        <span id="resultCtoF"></span><br>
        <label for="resultCtoK" id="rCK" style="display: none;">C to K:</label>
        <span id="resultCtoK"></span><br>
        <label for="resultFtoC" id="rFC" style="display: none;">F to C:</label>
        <span id="resultFtoC"></span><br>
        <label for="resultFtoK" id="rFK" style="display: none;">F to K:</label>
        <span id="resultFtoK"></span><br>
        <label for="resultKtoC" id="rKC" style="display: none;">K to C:</label>
        <span id="resultKtoC"></span><br>
        <label for="resultKtoF" id="rKF" style="display: none;">K to F:</label>
        <span id="resultKtoF"></span><br>
    </div>

    <script src="temperature.js"></script>
</body>
</html>
